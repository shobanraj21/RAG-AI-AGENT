apiVersion: apps/v1
kind: Deployment
metadata:
  name: stageconversationalagent-cholamandalam-com
  namespace: stageconversationalagent-cholamandalam-com
spec:
  selector:
    matchLabels:
      app: stageconversationalagent-cholamandalam-com
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: stageconversationalagent-cholamandalam-com
    spec:
      containers:
      - image: bom.ocir.io/bm2nhaouvzhw/stageconversationalagent.cholamandalam.com:latest
        resources:
          requests:
            memory: "300Mi"
            cpu: "150m"
        imagePullPolicy: Always
        name: stageconversationalagent-cholamandalam-com
        ports:
        - containerPort: 80 
        volumeMounts:
        - mountPath: /cholalogs
          name: efslogs
        lifecycle:
          preStop:
            exec:
              command: ["/bin/bash", "-c", "sleep 120"]
      volumes:
      - name: efslogs
        persistentVolumeClaim:
          claimName: efslogs-stageconversationalagent-pvc          
      imagePullSecrets:
      - name: ocirsecret
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: stageconversationalagent-cholamandalam-com
  namespace: stageconversationalagent-cholamandalam-com
spec:
  scaleTargetRef:
    apiVersion: "apps/v1"
    kind: Deployment
    name: stageconversationalagent-cholamandalam-com
  minReplicas: 1
  maxReplicas: 2
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300 
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 1
        periodSeconds: 15 
---     
apiVersion: v1
kind: Service
metadata:
  name: stageconversationalagent-cholamandalam-com
  namespace: stageconversationalagent-cholamandalam-com
spec:
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  type: NodePort
  selector:
    app: stageconversationalagent-cholamandalam-com
